agent:
    spawn_command: claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"
checklist:
    extra_categories: []
fab_version: 1.9.3
project:
    description: Go CLI for quick repo operations — locate, open, list, and clone repos from hop.yaml.
    name: hop
source_paths:
    - cmd
    - internal
stage_directives:
    apply: []
    hydrate: []
    intake: []
    review: []
    spec:
        - Use GIVEN/WHEN/THEN for scenarios
        - Mark ambiguities with [NEEDS CLARIFICATION]
    tasks: []
